<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leaflet：現在地＆住所検索＋マーカー編集</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; }
    #map { width: 100%; height: 100vh; }

    /* ツールバー */
    #toolbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 6px;
      background: rgba(255,255,255,0.95);
      padding: 6px 10px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    #toolbar button {
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: all 0.2s;
    }
    #btn-add-mode {
      background: #e85d04;
      color: white;
    }
    #btn-add-mode.active {
      background: #9d0208;
      box-shadow: 0 0 0 3px rgba(232,93,4,0.4);
    }
    #btn-download-kml {
      background: #2d6a4f;
      color: white;
    }
    #btn-download-kml:hover { background: #1b4332; }
    #btn-add-mode:hover { background: #9d0208; }
    #mode-label {
      display: flex;
      align-items: center;
      font-size: 12px;
      color: #555;
      margin-left: 4px;
    }

    /* ポップアップ内スタイル */
    .marker-popup { min-width: 160px; }
    .marker-popup .name-display {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 6px;
      color: #1a1a1a;
    }
    .marker-popup input[type=text] {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .popup-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .popup-btns button {
      flex: 1;
      padding: 4px 6px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }
    .btn-save { background: #e85d04; color: white; }
    .btn-delete { background: #6c757d; color: white; }

    /* マーカーラベル */
    .marker-label {
      background: rgba(255, 253, 200, 0.92);
      border: 1px solid #cca700;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 12px;
      font-weight: bold;
      color: #333;
      white-space: nowrap;
      pointer-events: none;
    }

    /* カーソル */
    #map.add-mode { cursor: crosshair; }
  </style>
</head>
<body>

<div id="toolbar">
  <button id="btn-add-mode" title="クリックしてマーカー追加モードを切替">📍 マーカー追加</button>
  <span id="mode-label">オフ</span>
  <button id="btn-download-kml" title="KMLファイルをダウンロード">⬇ KML保存</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script>
// =====================
//  地図初期化
// =====================
const map = L.map('map').setView([35.6812, 139.7671], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
}).addTo(map);

// 地理院タイルも選択肢として追加（レイヤーコントロール）
const gsiTile = L.tileLayer(
  'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',
  { attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html">地理院タイル</a>', maxZoom: 18 }
);
const osmTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
});
osmTile.addTo(map);
L.control.layers({ 'OpenStreetMap': osmTile, '地理院タイル': gsiTile }).addTo(map);

// ジオコーダー（住所検索）
L.Control.geocoder({
  defaultMarkGeocode: false,
  placeholder: '住所・地名を検索...',
  errorMessage: '見つかりませんでした'
}).on('markgeocode', e => {
  map.fitBounds(e.geocode.bbox);
}).addTo(map);

// 現在地ボタン
L.control.locate = function() {
  return L.control({ position: 'topleft' });
};
map.locate({ setView: false });

// =====================
//  マーカー管理
// =====================
const MARKER_COLOR = '#e85d04'; // オレンジ系赤
const markers = []; // { id, lat, lng, name, leafletMarker, labelMarker }
let markerCounter = 0;
let addMode = false;

// Google Mapsスタイルのカスタムアイコン（ドロップ型）
function createIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="36" viewBox="0 0 24 36">
    <path d="M12 0C5.373 0 0 5.373 0 12c0 8 12 24 12 24S24 20 24 12C24 5.373 18.627 0 12 0z"
      fill="${color}" stroke="white" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="5" fill="white" opacity="0.85"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [24, 36],
    iconAnchor: [12, 36],
    popupAnchor: [0, -38]
  });
}

function createLabelIcon(name) {
  return L.divIcon({
    html: `<div class="marker-label">${escapeHtml(name)}</div>`,
    className: '',
    iconSize: null,
    iconAnchor: [-4, 20]
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addMarker(lat, lng, name, id) {
  const mid = id || (++markerCounter);
  const markerName = name || '';

  const leafletMarker = L.marker([lat, lng], {
    icon: createIcon(MARKER_COLOR),
    draggable: false
  }).addTo(map);

  const entry = { id: mid, lat, lng, name: markerName, leafletMarker, labelMarker: null };

  // ラベルマーカー
  if (markerName) {
    const lm = L.marker([lat, lng], {
      icon: createLabelIcon(markerName),
      interactive: false
    }).addTo(map);
    entry.labelMarker = lm;
  }

  // ポップアップ
  leafletMarker.bindPopup(() => buildPopup(entry));
  leafletMarker.on('popupopen', () => {
    const popup = leafletMarker.getPopup();
    popup.setContent(buildPopup(entry));
  });

  markers.push(entry);
  return entry;
}

function buildPopup(entry) {
  const div = document.createElement('div');
  div.className = 'marker-popup';
  div.innerHTML = `
    <div class="name-display">${escapeHtml(entry.name) || '（名前なし）'}</div>
    <input type="text" id="popup-name-${entry.id}" value="${escapeHtml(entry.name)}" placeholder="名前を入力">
    <div class="popup-btns">
      <button class="btn-save" onclick="saveMarkerName(${entry.id})">💾 保存</button>
      <button class="btn-delete" onclick="deleteMarker(${entry.id})">🗑 削除</button>
    </div>
  `;
  return div;
}

window.saveMarkerName = function(id) {
  const entry = markers.find(m => m.id === id);
  if (!entry) return;
  const input = document.getElementById(`popup-name-${id}`);
  if (!input) return;
  entry.name = input.value.trim();

  // ラベル更新
  if (entry.labelMarker) {
    map.removeLayer(entry.labelMarker);
    entry.labelMarker = null;
  }
  if (entry.name) {
    entry.labelMarker = L.marker([entry.lat, entry.lng], {
      icon: createLabelIcon(entry.name),
      interactive: false
    }).addTo(map);
  }
  entry.leafletMarker.closePopup();
};

window.deleteMarker = function(id) {
  const idx = markers.findIndex(m => m.id === id);
  if (idx === -1) return;
  const entry = markers[idx];
  map.removeLayer(entry.leafletMarker);
  if (entry.labelMarker) map.removeLayer(entry.labelMarker);
  markers.splice(idx, 1);
};

// =====================
//  マーカー追加モード
// =====================
const btnAddMode = document.getElementById('btn-add-mode');
const modeLabel = document.getElementById('mode-label');
const mapEl = document.getElementById('map');

btnAddMode.addEventListener('click', () => {
  addMode = !addMode;
  btnAddMode.classList.toggle('active', addMode);
  modeLabel.textContent = addMode ? 'オン（地図をクリックで追加）' : 'オフ';
  mapEl.classList.toggle('add-mode', addMode);
});

map.on('click', e => {
  if (!addMode) return;
  addMarker(e.latlng.lat, e.latlng.lng, '');
});

// =====================
//  KML エクスポート
// =====================
document.getElementById('btn-download-kml').addEventListener('click', () => {
  if (markers.length === 0) {
    alert('マーカーがありません。');
    return;
  }
  const kml = buildKML(markers);
  const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'markers.kml';
  a.click();
  URL.revokeObjectURL(url);
});

function buildKML(entries) {
  const placemarks = entries.map(e => `
    <Placemark>
      <name>${xmlEscape(e.name || '')}</name>
      <Style>
        <IconStyle>
          <color>ff0460e8</color>
          <scale>1.2</scale>
          <Icon><href>http://maps.google.com/mapfiles/kml/paddle/red-circle.png</href></Icon>
        </IconStyle>
        <LabelStyle>
          <color>ff00aafb</color>
          <scale>0.85</scale>
        </LabelStyle>
      </Style>
      <Point><coordinates>${e.lng},${e.lat},0</coordinates></Point>
    </Placemark>`).join('\n');

  return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>マーカーデータ</name>
${placemarks}
  </Document>
</kml>`;
}

function xmlEscape(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

// =====================
//  KML インポート（URLパラメータ kml=xxx）
// =====================
(async function loadKMLFromParam() {
  const params = new URLSearchParams(location.search);
  const kmlPath = params.get('kml');
  if (!kmlPath) return;

  try {
    const res = await fetch(kmlPath);
    if (!res.ok) throw new Error('KMLファイルが取得できません: ' + kmlPath);
    const text = await res.text();
    parseAndLoadKML(text);
  } catch(err) {
    console.error(err);
    alert('KMLの読み込みに失敗しました: ' + err.message);
  }
})();

function parseAndLoadKML(kmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(kmlText, 'application/xml');
  const placemarks = doc.getElementsByTagName('Placemark');
  const bounds = [];

  Array.from(placemarks).forEach(pm => {
    const nameEl = pm.getElementsByTagName('name')[0];
    const coordEl = pm.getElementsByTagName('coordinates')[0];
    if (!coordEl) return;
    const name = nameEl ? nameEl.textContent.trim() : '';
    const coordStr = coordEl.textContent.trim();
    const parts = coordStr.split(',');
    if (parts.length < 2) return;
    const lng = parseFloat(parts[0]);
    const lat = parseFloat(parts[1]);
    if (isNaN(lat) || isNaN(lng)) return;
    addMarker(lat, lng, name);
    bounds.push([lat, lng]);
  });

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [40, 40] });
  }
}
</script>
</body>
</html>
