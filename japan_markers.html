<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leaflet：マーカー追加・編集＋KML保存＋KMLインポート</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; }
    #map { width: 100%; height: 100vh; }

    /* ツールバー */
    #toolbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 6px;
      background: rgba(255,255,255,0.95);
      padding: 6px 10px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    #toolbar button {
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: all 0.2s;
    }
    #btn-add-mode {
      background: #e85d04;
      color: white;
    }
    #btn-add-mode.active {
      background: #9d0208;
      box-shadow: 0 0 0 3px rgba(232,93,4,0.4);
    }
    #btn-download-kml {
      background: #2d6a4f;
      color: white;
    }
    #btn-download-kml:hover { background: #1b4332; }
    #btn-upload-kml {
      background: #1a5276;
      color: white;
    }
    #btn-upload-kml:hover { background: #103a52; }
    #btn-add-mode:hover { background: #9d0208; }
    #mode-label {
      display: flex;
      align-items: center;
      font-size: 12px;
      color: #555;
      margin-left: 4px;
    }

    /* ポップアップ内スタイル */
    .marker-popup { min-width: 160px; }
    .marker-popup .name-display {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 6px;
      color: #1a1a1a;
    }
    .marker-popup input[type=text] {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .popup-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .popup-btns button {
      flex: 1;
      padding: 4px 6px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }
    .btn-save { background: #e85d04; color: white; }
    .btn-delete { background: #6c757d; color: white; }

    /* マーカーラベル */
    .marker-label {
      background: rgba(255, 253, 200, 0.92);
      border: 1px solid #cca700;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 12px;
      font-weight: bold;
      color: #333;
      white-space: nowrap;
      pointer-events: none;
    }

    /* カーソル */
    #map.add-mode { cursor: crosshair; }

    /* KMLファイル名モーダル */
    #kml-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    #kml-modal-overlay.open { display: flex; }
    #kml-modal {
      background: white;
      border-radius: 10px;
      padding: 24px 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      min-width: 300px;
    }
    #kml-modal h3 {
      margin-bottom: 14px;
      font-size: 15px;
      color: #222;
    }
    #kml-modal input[type=text] {
      width: 100%;
      padding: 7px 10px;
      border: 1.5px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #kml-modal input[type=text]:focus { border-color: #2d6a4f; }
    #kml-modal .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    #kml-modal .modal-btns button {
      padding: 7px 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }
    #kml-modal-ok { background: #2d6a4f; color: white; }
    #kml-modal-ok:hover { background: #1b4332; }
    #kml-modal-cancel { background: #e9ecef; color: #333; }
    #kml-modal-cancel:hover { background: #dee2e6; }
  </style>
</head>
<body>

<div id="toolbar">
  <button id="btn-add-mode" title="クリックしてマーカー追加モードを切替">📍 マーカー追加</button>
  <span id="mode-label">オフ</span>
  <button id="btn-download-kml" title="KMLファイルをダウンロード">⬇ KML保存</button>
  <button id="btn-upload-kml" title="KMLファイルをアップロード">⬆ KMLアップロード</button>
  <input type="file" id="kml-file-input" accept=".kml,application/vnd.google-earth.kml+xml,application/xml,text/xml" style="display:none">
</div>

<!-- KMLファイル名入力モーダル -->
<div id="kml-modal-overlay">
  <div id="kml-modal">
    <h3>⬇ KMLファイルを保存</h3>
    <input type="text" id="kml-filename" placeholder="ファイル名（例: mymarkers）">
    <div class="modal-btns">
      <button id="kml-modal-cancel">キャンセル</button>
      <button id="kml-modal-ok">ダウンロード</button>
    </div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.js"></script>
<script>
// =====================
//  地図初期化
// =====================
const map = L.map('map').setView([35.6812, 139.7671], 6);

// タイルレイヤー定義
const osmTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
});
const googleRoadTile = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
  attribution: '&copy; <a href="https://www.google.com/maps">Google Maps</a>',
  maxZoom: 20
});
const googleSatTile = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
  attribution: '&copy; <a href="https://www.google.com/maps">Google Maps</a>',
  maxZoom: 20
});
const googleHybridTile = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '&copy; <a href="https://www.google.com/maps">Google Maps</a>',
  maxZoom: 20
});
const gsiTile = L.tileLayer(
  'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',
  { attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html">地理院タイル</a>', maxZoom: 18 }
);
osmTile.addTo(map);
L.control.layers({
  'OpenStreetMap': osmTile,
  'Google マップ': googleRoadTile,
  '衛星': googleSatTile,
/*  'Google マップ（ハイブリッド）': googleHybridTile, */
  '地理院': gsiTile
}).addTo(map);

// ジオコーダー（住所検索）
L.Control.geocoder({
  defaultMarkGeocode: false,
  placeholder: '住所・地名を検索...',
  errorMessage: '見つかりませんでした'
}).on('markgeocode', e => {
  map.fitBounds(e.geocode.bbox);
}).addTo(map);

// =====================
//  マーカー管理
// =====================
const MARKER_COLOR = '#e85d04'; // オレンジ系赤
const markers = []; // { id, lat, lng, name, leafletMarker, labelMarker }
let markerCounter = 0;
let addMode = false;

// Google Mapsスタイルのカスタムアイコン（ドロップ型）
function createIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="36" viewBox="0 0 24 36">
    <path d="M12 0C5.373 0 0 5.373 0 12c0 8 12 24 12 24S24 20 24 12C24 5.373 18.627 0 12 0z"
      fill="${color}" stroke="white" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="5" fill="white" opacity="0.85"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [24, 36],
    iconAnchor: [12, 36],
    popupAnchor: [0, -38]
  });
}

function createLabelIcon(name) {
  return L.divIcon({
    html: `<div class="marker-label">${escapeHtml(name)}</div>`,
    className: '',
    iconSize: null,
    iconAnchor: [-4, 20]
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addMarker(lat, lng, name, id) {
  const mid = id || (++markerCounter);
  const markerName = name || '';

  const leafletMarker = L.marker([lat, lng], {
    icon: createIcon(MARKER_COLOR),
    draggable: false
  }).addTo(map);

  const entry = { id: mid, lat, lng, name: markerName, leafletMarker, labelMarker: null };

  // ラベルマーカー
  if (markerName) {
    const lm = L.marker([lat, lng], {
      icon: createLabelIcon(markerName),
      interactive: false
    }).addTo(map);
    entry.labelMarker = lm;
  }

  // ポップアップ
  leafletMarker.bindPopup(() => buildPopup(entry));
  leafletMarker.on('popupopen', () => {
    const popup = leafletMarker.getPopup();
    popup.setContent(buildPopup(entry));
  });

  markers.push(entry);
  return entry;
}

function buildPopup(entry) {
  const div = document.createElement('div');
  div.className = 'marker-popup';
  div.innerHTML = `
    <div class="name-display">${escapeHtml(entry.name) || '（名前なし）'}</div>
    <input type="text" id="popup-name-${entry.id}" value="${escapeHtml(entry.name)}" placeholder="名前を入力">
    <div class="popup-btns">
      <button class="btn-save" onclick="saveMarkerName(${entry.id})">💾 保存</button>
      <button class="btn-delete" onclick="deleteMarker(${entry.id})">🗑 削除</button>
    </div>
  `;
  return div;
}

window.saveMarkerName = function(id) {
  const entry = markers.find(m => m.id === id);
  if (!entry) return;
  const input = document.getElementById(`popup-name-${id}`);
  if (!input) return;
  entry.name = input.value.trim();

  // ラベル更新
  if (entry.labelMarker) {
    map.removeLayer(entry.labelMarker);
    entry.labelMarker = null;
  }
  if (entry.name) {
    entry.labelMarker = L.marker([entry.lat, entry.lng], {
      icon: createLabelIcon(entry.name),
      interactive: false
    }).addTo(map);
  }
  entry.leafletMarker.closePopup();
};

window.deleteMarker = function(id) {
  const idx = markers.findIndex(m => m.id === id);
  if (idx === -1) return;
  const entry = markers[idx];
  map.removeLayer(entry.leafletMarker);
  if (entry.labelMarker) map.removeLayer(entry.labelMarker);
  markers.splice(idx, 1);
};

// =====================
//  マーカー追加モード
// =====================
const btnAddMode = document.getElementById('btn-add-mode');
const modeLabel = document.getElementById('mode-label');
const mapEl = document.getElementById('map');

btnAddMode.addEventListener('click', () => {
  addMode = !addMode;
  btnAddMode.classList.toggle('active', addMode);
  modeLabel.textContent = addMode ? 'オン（地図をクリックで追加）' : 'オフ';
  mapEl.classList.toggle('add-mode', addMode);
});

map.on('click', e => {
  if (!addMode) return;
  addMarker(e.latlng.lat, e.latlng.lng, '');
});

// =====================
//  現在地ボタン（継続追跡）
// =====================
let locateMarker = null;
let locateCircle = null;
let watchId = null;
let firstFix = false;
const LOCATE_INTERVAL_MS = 3000; // 検索間隔（3秒）

function updateLocateMarker(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const acc = pos.coords.accuracy;

  if (!firstFix) {
    map.setView([lat, lng], 15);
    firstFix = true;
  }

  if (locateMarker) { map.removeLayer(locateMarker); }
  if (locateCircle) { map.removeLayer(locateCircle); }

  locateCircle = L.circle([lat, lng], {
    radius: acc,
    color: '#1a73e8',
    fillColor: '#1a73e8',
    fillOpacity: 0.12,
    weight: 1.5
  }).addTo(map);

  locateMarker = L.circleMarker([lat, lng], {
    radius: 9,
    color: 'white',
    fillColor: '#1a73e8',
    fillOpacity: 1,
    weight: 2.5
  }).bindPopup('現在地').addTo(map);
}

function pollLocation() {
  navigator.geolocation.getCurrentPosition(updateLocateMarker, err => {
    alert('現在地の取得に失敗しました: ' + err.message);
    stopWatch();
  }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
}

function startWatch() {
  if (!navigator.geolocation) {
    alert('このブラウザは現在地取得に対応していません。');
    return;
  }
  if (watchId !== null) return; // 既に追跡中

  firstFix = false;
  pollLocation(); // 即座に1回取得
  watchId = setInterval(pollLocation, LOCATE_INTERVAL_MS); // 以後5秒おき
}

function stopWatch() {
  if (watchId !== null) {
    clearInterval(watchId);
    watchId = null;
  }
  if (locateMarker) { map.removeLayer(locateMarker); locateMarker = null; }
  if (locateCircle) { map.removeLayer(locateCircle); locateCircle = null; }
}

// =====================
//  easyButton：現在地・停止・全体表示
// =====================
L.easyButton('fas fa-map-marker-alt', function() {
  stopWatch();
  startWatch();
}, '現在地を表示（継続追跡）').addTo(map);

L.easyButton('fa fa-times', function() {
  stopWatch();
}, '現在地追跡を停止').addTo(map);

L.easyButton('fa fa-reply-all', function() {
  if (markers.length === 0) {
    alert('マーカーがありません。');
    return;
  }
  const bounds = markers.map(m => [m.lat, m.lng]);
  map.fitBounds(bounds, { padding: [50, 50] });
}, 'マーカー全体を表示').addTo(map);

// =====================
//  KML エクスポート（ファイル名指定モーダル）
// =====================
const kmlOverlay  = document.getElementById('kml-modal-overlay');
const kmlFilename = document.getElementById('kml-filename');

document.getElementById('btn-download-kml').addEventListener('click', () => {
  if (markers.length === 0) { alert('マーカーがありません。'); return; }
  // デフォルトファイル名を今日の日付で設定
  const today = new Date();
  const dateStr = today.getFullYear()
    + ('0'+(today.getMonth()+1)).slice(-2)
    + ('0'+today.getDate()).slice(-2);
  kmlFilename.value = 'markers_' + dateStr;
  kmlOverlay.classList.add('open');
  kmlFilename.focus();
  kmlFilename.select();
});

document.getElementById('kml-modal-cancel').addEventListener('click', () => {
  kmlOverlay.classList.remove('open');
});

kmlOverlay.addEventListener('click', e => {
  if (e.target === kmlOverlay) kmlOverlay.classList.remove('open');
});

kmlFilename.addEventListener('keydown', e => {
  if (e.key === 'Enter') doDownloadKML();
});

document.getElementById('kml-modal-ok').addEventListener('click', doDownloadKML);

function doDownloadKML() {
  let name = kmlFilename.value.trim() || 'markers';
  // .kml拡張子を重複しないよう付与
  if (!name.toLowerCase().endsWith('.kml')) name += '.kml';
  const kml = buildKML(markers);
  const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.click();
  URL.revokeObjectURL(url);
  kmlOverlay.classList.remove('open');
}

function buildKML(entries) {
  const placemarks = entries.map(e => `
    <Placemark>
      <name>${xmlEscape(e.name || '')}</name>
      <Style>
        <IconStyle>
          <color>ff0460e8</color>
          <scale>1.2</scale>
          <Icon><href>http://maps.google.com/mapfiles/kml/paddle/red-circle.png</href></Icon>
        </IconStyle>
        <LabelStyle>
          <color>ff00aafb</color>
          <scale>0.85</scale>
        </LabelStyle>
      </Style>
      <Point><coordinates>${e.lng},${e.lat},0</coordinates></Point>
    </Placemark>`).join('\n');

  return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>マーカーデータ</name>
${placemarks}
  </Document>
</kml>`;
}

function xmlEscape(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

// =====================
//  KML インポート（ローカルファイルアップロード）
// =====================
const btnUploadKML = document.getElementById('btn-upload-kml');
const kmlFileInput = document.getElementById('kml-file-input');

btnUploadKML.addEventListener('click', () => {
  kmlFileInput.value = ''; // 同じファイルを再選択しても発火するようにリセット
  kmlFileInput.click();
});

kmlFileInput.addEventListener('change', () => {
  const file = kmlFileInput.files && kmlFileInput.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    try {
      parseAndLoadKML(reader.result);
    } catch (err) {
      console.error(err);
      alert('KMLの読み込みに失敗しました: ' + err.message);
    }
  };
  reader.onerror = () => {
    alert('ファイルの読み込みに失敗しました。');
  };
  reader.readAsText(file, 'UTF-8');
});

// =====================
//  KML インポート（URLパラメータ kml=xxx）
// =====================
(async function loadKMLFromParam() {
  const params = new URLSearchParams(location.search);
  const kmlPath = params.get('kml');
  if (!kmlPath) return;

  try {
    const res = await fetch(kmlPath);
    if (!res.ok) throw new Error('KMLファイルが取得できません: ' + kmlPath);
    const text = await res.text();
    parseAndLoadKML(text);
  } catch(err) {
    console.error(err);
    alert('KMLの読み込みに失敗しました: ' + err.message);
  }
})();

function parseAndLoadKML(kmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(kmlText, 'application/xml');
  const placemarks = doc.getElementsByTagName('Placemark');
  const bounds = [];

  Array.from(placemarks).forEach(pm => {
    const nameEl = pm.getElementsByTagName('name')[0];
    const coordEl = pm.getElementsByTagName('coordinates')[0];
    if (!coordEl) return;
    const name = nameEl ? nameEl.textContent.trim() : '';
    const coordStr = coordEl.textContent.trim();
    const parts = coordStr.split(',');
    if (parts.length < 2) return;
    const lng = parseFloat(parts[0]);
    const lat = parseFloat(parts[1]);
    if (isNaN(lat) || isNaN(lng)) return;
    addMarker(lat, lng, name);
    bounds.push([lat, lng]);
  });

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [40, 40] });
  }
}
</script>
</body>
</html>
